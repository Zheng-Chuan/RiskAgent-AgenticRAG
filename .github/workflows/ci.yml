name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: ${{ github.workspace }}/models/hf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: unit tests
        run: |
          python -m unittest tests.test_week1_rag_baseline
          python -m unittest tests.test_week2_rag_citation_quality
          python -m unittest tests.test_week5_refusal_quality

