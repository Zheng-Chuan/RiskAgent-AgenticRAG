name: nightly-eval

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: ${{ github.workspace }}/models/hf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: cache hf models
        uses: actions/cache@v4
        with:
          path: models/hf
          key: hf-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: run evaluation
        run: |
          python -m riskagent_rag.evaluation.run --artifacts-dir .artifacts --dataset tests/data/questions.json
      - name: upload reports
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-reports
          path: .artifacts/reports/*.json

