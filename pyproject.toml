[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "riskagent-rag"
version = "0.1.0"
description = "RiskAgent-RAG System"
dependencies = [
    "gradio",
    "langgraph",
    "langchain",
    "langchain-community",
    "langchain-milvus",
    "langchain-openai",
    "langchain-huggingface",
    "sentence-transformers",
    "pymilvus",
    "pydantic",
    "python-dotenv"
]

[tool.setuptools.packages.find]
where = ["src"]
