[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "riskagent-rag"
version = "0.1.0"
description = "RiskAgent-RAG System"
dependencies = [
    "gradio",
    "langgraph",
    "langchain",
    "langchain-community",
    "langchain-milvus",
    "langchain-openai",
    "langchain-huggingface",
    "sentence-transformers",
    "pymilvus[milvus_lite]",
    "pydantic",
    "python-dotenv",
    "pylint"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
extraPaths = ["src"]

[tool.pylint.MASTER]
ignore-paths = [
    "^models/.*$",
    "^deploy/.*$",
    "^docs/.*$",
]
init-hook = "import os,sys; sys.path.insert(0, os.path.abspath(os.path.join(os.getcwd(), 'src')))"

[tool.pylint.'MESSAGES CONTROL']
disable = [
    "missing-module-docstring",
    "missing-class-docstring",
    "missing-function-docstring",
    "line-too-long",
    "too-few-public-methods",
    "broad-exception-caught",
    "chained-comparison",
    "import-error",
    "import-outside-toplevel",
    "invalid-name",
    "no-member",
    "protected-access",
    "unused-variable",
    "duplicate-code",
    "consider-using-with",
    "wrong-import-position",
    "too-many-locals",
    "too-many-statements",
    "too-many-arguments",
    "too-many-branches",
    "consider-iterating-dictionary",
    "trailing-newlines",
    "trailing-whitespace",
]

[tool.pylint.FORMAT]
max-line-length = 120
